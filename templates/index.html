<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title> Human Step Counter</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    linear-gradient(135deg,#020617,#0f172a);

    font-family:Arial,sans-serif;

    color:white;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;
}

.container{

    width:100%;

    max-width:950px;

    background:rgba(30,41,59,0.9);

    backdrop-filter:blur(10px);

    border-radius:25px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 0 40px rgba(0,0,0,0.5);
}

h1{

    color:#38bdf8;

    margin-bottom:10px;

    font-size:42px;
}

.subtitle{

    color:#94a3b8;

    margin-bottom:35px;

    font-size:18px;
}

.upload-box{

    border:2px dashed #38bdf8;

    padding:35px;

    border-radius:20px;

    background:#0f172a;

    transition:0.3s;
}

.upload-box:hover{

    transform:scale(1.01);
}

input[type="file"]{

    margin:20px 0;

    color:white;

    font-size:16px;
}

button{

    background:
    linear-gradient(135deg,#38bdf8,#0ea5e9);

    border:none;

    color:white;

    padding:15px 35px;

    border-radius:12px;

    cursor:pointer;

    font-size:18px;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 20px rgba(56,189,248,0.5);
}

.loader{

    display:none;

    margin-top:25px;

    font-size:22px;

    color:#facc15;

    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }
}

.result{

    margin-top:30px;

    font-size:32px;

    color:#22c55e;

    font-weight:bold;
}

video{

    width:100%;

    margin-top:30px;

    border-radius:20px;

    border:3px solid #38bdf8;

    background:black;
}

.footer{

    margin-top:25px;

    color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

    <h1>🚶 Human Step Counter</h1>

    <div class="subtitle">
        Upload your walking video and detect steps using MoveNet AI
    </div>

    <form method="POST"
          enctype="multipart/form-data"
          id="uploadForm">

        <div class="upload-box">

            <input type="file"
                   name="video"
                   accept="video/*"
                   required>

            <br>

            <button type="submit">
                Upload & Process
            </button>

        </div>

    </form>

    <div class="loader" id="loader">
        ⏳ Processing Video...
    </div>

    {% if video_path %}


    <video controls autoplay>

        <source src="{{ video_path }}"
                type="video/mp4">

    </video>

    {% endif %}

    <div class="result">
        ✅ Total Steps: {{ step_count }}
    </div>
    

</div>

<script>

document
.getElementById("uploadForm")
.addEventListener("submit", function(){

    document
    .getElementById("loader")
    .style.display = "block";

});

</script>

</body>

</html>
